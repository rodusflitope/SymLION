name: lion_env
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.5.*
  - torchvision=0.20.*
  - torchaudio=2.5.*
  - pytorch-cuda=12.1
  - numpy<2
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - pillow
  - pyyaml
  - tqdm
  - pip:
      - -r requirements.txt
